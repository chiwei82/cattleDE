# Global configuration shared by the prep scripts (prep/*.py).
# Each script loads this file from the repository root.

# ── Shared ─────────────────────────────────────────────────────────────────────
random_seed: 42

# train:val:test = 6:2:2
split:
  val_ratio: 0.2
  test_ratio: 0.2

paths:
  annotated_dir: data/annotated   # annotated_{action,interaction}.csv live here
  data_root: /user/work/sf24225/data/Full_behav/Marco
  clips_dir: /user/work/sf24225/data/Full_behav/Marco/clips
  hrnet_ckpt: checkpoints/hrnet_w32_ap10k_256x256-18aac840_20211029.pth
  yolo_ckpt: checkpoints/yolo.pt

# ── YOLO OBB training (main_task.sh) ──────────────────────────────────────────
yolo_train:
  model: yolo11n-obb.pt   # base model to fine-tune
  epochs: 50
  imgsz: 1280
  run_dir: log/yolo       # ultralytics run output (relative to repo root)
  run_name: obb_train

# ── Pose visualization (prep/pose_vis.py) ─────────────────────────────────────
pose_vis:
  num_samples: 20
  conf_kp: 0.3            # min keypoint confidence to draw

# ── YOLO OBB dataset prep (prep/yolo_prep.py) ─────────────────────────────────
yolo_prep:
  output_dir: data/object
  frame_step: 16          # sample every N frames (~1 per second at 16 fps)
  camera_dirs: [camera128, camera133, camera26, camera27, camera48]

# ── Pseudo-labeling test split with an independent COCO model ─────────────────
# (prep/pseudo_label_test.py) Auto-fills missing cattle labels using an
# off-the-shelf COCO detector — NO manual annotation. Output is a pseudo-label
# set, not human-verified ground truth.
pseudo_label:
  split: test             # which split of yolo_prep.output_dir to augment
  model: yolo11x.pt       # COCO-pretrained detector (auto-downloads)
  coco_cow_class: 19      # "cow" class id in COCO
  conf: 0.25              # COCO detection confidence threshold
  imgsz: 1280
  iou_match_thresh: 0.3   # a COCO box with max IoU < this vs existing labels
                          # counts as a missing cow and gets added
  pseudo_suffix: _pseudo  # output dataset dir = <output_dir><suffix>

# ── Interaction dataset prep (prep/interaction_prep.py) ───────────────────────
interaction_prep:
  video_dir: "/user/work/sf24225/data/Full_behav/Videos to process batch 1 - social contacts"
  output_dir: data/interaction
  use_pose: false         # false = skip HRNet entirely; pose columns stay empty
  sample_fps: 1.0
  iou_low: 0.1
  iou_high: 0.8
  yolo_conf: 0.489 # based on best f1-score
  yolo_imgsz: 1280
  nested_thresh: 0.85

# ── Action dataset prep (prep/action_prep.py) ─────────────────────────────────
action_prep:
  output_dir: data/action
  use_pose: false         # false = skip HRNet entirely; pose_path stays empty
  sample_every: 8         # 1 frame every N frames (16 fps clips -> 2 fps)
  pose_batch: 32          # HRNet inference batch size
  labels: [standing, stepping, walking, lying, transitiondown, transitionup, sniffingbed]

# ── HRNet constants ────────────────────────────────────────────────────────────
hrnet:
  num_joints: 17
  input_size: 256
  hmap_size: 64
